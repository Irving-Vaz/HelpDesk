<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="public/css/menu.css">
    <title>Login de Usuario</title>
</head>
<body>
   <div class="wrapper fadeInDown">
        <div id="formContent">
            <!-- Tabs Titles -->

            <!-- Icon -->
            <div class="fadeIn first">
            <img src="public/img/Sesion.png" id="icon" alt="User Icon" />
            <h1>Help-Desk</h1>
            </div>

            <!-- Login Form -->
            <form id="frmLogin" method="post" onsubmit="return loginUsuario()">
                <input type="text" id="login" class="fadeIn second" name="login" placeholder="username" required>
                <input type="text" id="password" class="fadeIn third" name="password" placeholder="password" required>
                <input type="submit" class="fadeIn fourth" value="Entrar">
            </form>

            <!-- Remind Passowrd -->
            <div id="formFooter">
            <a class="underlineHover" href="#" data-bs-toggle="modal" data-bs-target="#modalContacto">CONTACTAR AL ADMINISTRADOR</a>
            </div>
        </div>
    </div> 

<!-- Modal -->
<div class="modal fade" id="modalContacto" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
            <h5 class="modal-title" id="exampleModalLabel">Contacto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            Si no tienes una cuenta  envia un correo electronico a: empresahelpdesk@gmail.com
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>


    <script src="public/jquery/jquery-3.6.0.min.js"></script>
    <script src="public/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="public/JS/usuarios/login.js"></script> 
    
</body>
</html>
